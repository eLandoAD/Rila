version: '3.8'

services:
  postgres-db:
    image: postgres:16-alpine
    container_name: securevault_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: securevault_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d securevault_db"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: rila-backend
    container_name: rila-backend
    restart: unless-stopped
    depends_on:
      postgres-db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/securevault_db
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-password}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me-0123456789-0123456789-0123456789-abcdef}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-3600000}
      # SMTP (valori reali in .env, non committato)
      SPRING_MAIL_HOST: ${SMTP_HOST:-mail.northleap.it}
      SPRING_MAIL_PORT: ${SMTP_PORT:-587}
      SPRING_MAIL_USERNAME: ${SMTP_USER:-noreply@northleap.it}
      SPRING_MAIL_PASSWORD: ${SMTP_PASSWORD:-}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: "${SMTP_AUTH:-true}"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: "${SMTP_STARTTLS:-true}"
      APP_MAIL_FROM: ${SMTP_USER:-noreply@northleap.it}
      APP_FRONTEND_URL: ${FRONTEND_URL:-http://localhost:4200}
      # Storage persistente: punta esplicitamente al volume montato sotto /storage
      APP_STORAGE_PATH: /storage
    ports:
      - "${BACKEND_PORT:-8085}:8080"
    volumes:
      - securevault_storage:/storage

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: rila-frontend
    container_name: rila-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4200
    expose:
      - "4200"

  # Reverse proxy: unica origin per frontend (/) e backend (/api)
  proxy:
    build:
      context: .
      dockerfile: Dockerfile.proxy
    image: rila-proxy
    container_name: rila-proxy
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "${PROXY_PORT:-4205}:80"

  # Dev SMTP catcher: captures outgoing emails, web UI on http://localhost:8025
  mailhog:
    image: mailhog/mailhog:latest
    container_name: securevault_mailhog
    restart: unless-stopped
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"
      - "${MAILHOG_PORT:-8025}:8025"

volumes:
  postgres_data:
  securevault_storage:
