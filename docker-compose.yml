version: '3.8'

services:
  postgres-db:
    image: postgres:16-alpine
    container_name: securevault_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: securevault_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: rila-frontend
    container_name: rila-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
    ports:
      - "4000:4000"
