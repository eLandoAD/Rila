server:
  port: 8080

spring:
  datasource:
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    # protocol : driver : server : porta / nome_db
    url: jdbc:postgresql://localhost:5432/securevault_db
    driver-class-name: org.postgresql.Driver
  jpa:
      hibernate:
        # crea o aggiorna le tabelle sul DB in automatico all'avvio
        ddl-auto: update
      # query
      show-sql: true
      properties:
        hibernate:
          dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}

