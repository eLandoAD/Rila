server:
  port: 8080

spring:
  datasource:
    username: postgres
    password: CHANGE_ME
    # protocol : driver : server : porta / nome_db
    url: jdbc:postgresql://localhost:5432/securevault_db
    driver-class-name: org.postgresql.Driver
  jpa:
      hibernate:
        # crea o aggiorna le tabelle sul DB in automatico all'avvio
        ddl-auto: update
      # query
      show-sql: true
      properties:
        hibernate:
          dialect: org.hibernate.dialect.PostgreSQLDialect
          jdbc:
            time_zone: UTC
  # SMTP — in locale punta al catcher Mailpit (docker-compose), in prod usa SMTP reale
  mail:
    host: localhost
    port: 1025
    username:
    password:
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false


jwt:
  # Genera un segreto casuale lungo (min 32 caratteri), es: openssl rand -base64 48
  # In produzione viene passato via variabile d'ambiente JWT_SECRET (NON committare quello vero).
  secret: "CHANGE_ME_USE_A_RANDOM_SECRET_AT_LEAST_32_CHARS"
  expiration: 3600000

# parametri applicativi usati nelle email
app:
  # mittente delle email transazionali
  mail:
    from: noreply@securevault.app
  # base URL del frontend per i link in email (verifica / reset)
  frontend-url: http://localhost:4200
  # DEMO: se true gli account nascono già verificati (enabled=true) così anche un
  # estraneo può loggarsi subito senza aprire la mail. In prod lasciare false.
  demo:
    auto-verify: false
    reveal-token: false


