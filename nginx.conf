events {}

http {
  # non esporre la versione di nginx nell'header Server (SEO/security)
  server_tokens off;

  # compressione GZip delle risposte (anche quelle proxate al frontend/backend)
  gzip on;
  gzip_comp_level 5;
  gzip_min_length 256;
  gzip_proxied any;
  gzip_vary on;
  gzip_types
    application/javascript application/json application/xml application/xml+rss
    application/manifest+json text/css text/plain text/xml image/svg+xml font/woff2;

  # Reverse proxy: serve frontend e backend sotto un'unica origin così le chiamate
  # relative a /api funzionano senza CORS (stesso pattern della produzione).
  server {
    listen 80;

    # upload cifrati possono essere grandi
    client_max_body_size 100m;
    # security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; object-src 'none'; form-action 'self'" always;

    location /api/ {
      proxy_pass http://backend:8080;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      proxy_pass http://frontend:4200;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      # il server SSR (Node/Express) manda X-Powered-By: lo togliamo
      proxy_hide_header X-Powered-By;
    }
  }
}
