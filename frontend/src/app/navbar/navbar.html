<div class="navbar bg-base-100 shadow-sm">
  <div class="navbar-start">
    <div class="dropdown">
      <div tabindex="0" role="button" class="btn btn-ghost btn-circle">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"> <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7" /> </svg>
      </div>
      <ul
        tabindex="-1"
        class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow">
        <li><a routerLink="/">Homepage</a></li>
        <li><a routerLink="/about">About us</a></li>
        <li><a href="mailto:alessio.ferrari@marconirovereto.it">Contact</a></li>
      </ul>
    </div>
  </div>
  <!-- Navbar Center -->
  <div class="navbar-center">
    <a routerLink="/" class="btn btn-ghost rounded-xl text-xl text-bold">SecureVault</a>
  </div>
  <!-- Navbar End -->
  <div class="navbar-end">
    @if (!isAuthenticated()) {
      <!-- Login/Sign In Button -->
      <a routerLink="/login" class="btn rounded-xl">Login</a>
    } @else {
      <!-- Notification Button -->
      <button class="btn btn-ghost btn-circle">
        <div class="indicator">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"> <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" /> </svg>
          <span class="badge badge-xs badge-error indicator-item"></span>
        </div>
      </button>
      <!-- User Avatar -->
      <div class="dropdown dropdown-end">
        <div tabindex="0" role="button" class="btn btn-ghost btn-circle avatar">
          <div class="w-10 rounded-full">
            <img
              alt="User avatar"
              [src]="'https://api.dicebear.com/9.x/initials/svg?seed=' + (username() ?? 'User')" />
          </div>
        </div>
        <ul
          tabindex="-1"
          class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow">
          <li class="menu-title">{{ username() }}</li>
          <li><a routerLink="/filemanager/dashboard">Dashboard</a></li>
          <li><a routerLink="/filemanager/files">My Files</a></li>
          <li><a (click)="logout()">Logout</a></li>
        </ul>
      </div>
    }
  </div>
</div>
