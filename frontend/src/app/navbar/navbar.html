@if(isLogin()) {
  <nav class="bg-[#0B0E17] fixed w-full z-20 top-0 start-0 border-b border-white/10">
    <div class="max-w-screen-xl flex flex-wrap items-center justify-between mx-auto p-4">
      <a (click)="toHome()" class="flex items-center space-x-3 rtl:space-x-reverse cursor-pointer">
        <img src="icon.png" class="h-7" alt="Logo">
        <span class="self-center text-xl text-white font-semibold">SecureVault</span>
      </a>
      <div class="flex md:order-2 space-x-3 md:space-x-0 rtl:space-x-reverse">
        <button (click)="toLogin()" class="btn rounded-lg border border-white/15 bg-white/10 text-white shadow-none hover:bg-white/15 hover:border-white/25">Login</button>
      </div>
    </div>

  </nav>
} @else {
  <!-- mobile: navbar in basso (border-t) · da md in su: in alto (border-b) -->
  <nav class="bg-[#0B0E17] fixed w-full z-20 start-0 bottom-0 border-t md:bottom-auto md:top-0 md:border-t-0 md:border-b border-white/10">
    <div class="w-full flex flex-wrap items-center justify-between px-7 py-4">
      <a (click)="toHome()" class="flex items-center space-x-3 rtl:space-x-reverse cursor-pointer">
        <img src="icon.png" class="h-7" alt="Logo">
        <span class="self-center text-xl text-white font-semibold">SecureVault</span>
      </a>
      <div class="navbar-center hidden md:flex">
        <ul class="flex items-center gap-15">
          <li><a routerLink="/" fragment="features" class="cursor-pointer text-white/70 no-underline hover:text-white hover:bg-transparent">Features</a></li>
          <li><a routerLink="/" fragment="pricing" class="cursor-pointer text-white/70 no-underline hover:text-white hover:bg-transparent">Pricing</a></li>
          <li><a routerLink="/" fragment="security" class="cursor-pointer text-white/70 no-underline hover:text-white hover:bg-transparent">Security</a></li>
          <li><a routerLink="/" fragment="support" class="cursor-pointer text-white/70 no-underline hover:text-white hover:bg-transparent">Support</a></li>
        </ul>
      </div>
      <div class="flex md:order-2 space-x-3 md:space-x-0 rtl:space-x-reverse">
        <button (click)="toLogin()" class="btn rounded-lg border border-white/15 bg-white/10 text-white shadow-none hover:bg-white/15 hover:border-white/25">Login</button>
      </div>
    </div>

  </nav>
}
