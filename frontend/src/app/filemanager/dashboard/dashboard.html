<div class="flex min-h-screen">
  <app-side-navbar></app-side-navbar>
  <main class="flex-1 p-6">
    <h1 class="text-2xl font-bold">Dashboard</h1>

    <div class="card bg-base-100 border-base-300 mt-6 w-56 border shadow-sm">
      <div class="card-body items-center gap-3 p-5">
        <h2 class="card-title text-sm">Spazio utilizzato</h2>
        <div class="relative h-32 w-32 rounded-full"
          [style.background]="'conic-gradient(var(--color-primary) ' + percent() + '%, var(--color-base-300) ' + percent() + '%)'">
          <div class="bg-base-100 absolute inset-3 flex items-center justify-center rounded-full">
            <span class="text-xl font-bold">{{ percent() }}%</span>
          </div>
        </div>
        <p class="text-base-content/70 text-xs">{{ usedGb() }} GB di {{ totalGb() }} GB</p>
      </div>
    </div>
  </main>

</div>
