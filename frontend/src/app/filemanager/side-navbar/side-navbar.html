<aside
  class="side-navbar bg-base-100 border-base-300 flex h-full flex-col border-r transition-all duration-300 ease-in-out"
  [class.w-64]="!collapsed()"
  [class.w-20]="collapsed()">
  <!-- Brand + toggle -->
  <div class="border-base-300 flex items-center border-b px-4 py-4"
    [class.justify-between]="!collapsed()"
    [class.justify-center]="collapsed()">
    @if (!collapsed()) {
      <div class="flex items-center gap-2 overflow-hidden">
        <svg xmlns="http://www.w3.org/2000/svg" class="text-primary h-6 w-6 shrink-0" fill="none"
          viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A13.916 13.916 0 008 11a4 4 0 118 0c0 1.017-.07 2.019-.203 3m-2.118 6.844A21.88 21.88 0 0015.171 17m3.839 1.132c.645-2.266.99-4.659.99-7.132A8 8 0 008 4.07M3 15.364c.64-1.319 1-2.8 1-4.364 0-1.457.39-2.823 1.07-4" />
        </svg>
        <span class="truncate text-base font-bold">SecureVault</span>
      </div>
    }
    <button type="button" class="btn btn-ghost btn-sm btn-circle"
      (click)="toggle()"
      [attr.aria-label]="collapsed() ? 'Espandi menu' : 'Comprimi menu'">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 transition-transform duration-300"
        [class.rotate-180]="collapsed()" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
      </svg>
    </button>
  </div>

  <!-- Nav -->
  <nav class="flex-1 overflow-y-auto p-3">
    <ul class="menu w-full gap-1" [class.menu-md]="!collapsed()">
      <li>
        <a routerLink="/filemanager/dashboard" routerLinkActive="menu-active"
          [class.justify-center]="collapsed()"
          [attr.title]="collapsed() ? 'Dashboard' : null">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" fill="none"
            viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
          </svg>
          @if (!collapsed()) { <span class="truncate">Dashboard</span> }
        </a>
      </li>
      <li>
        <a routerLink="/filemanager/files" routerLinkActive="menu-active"
          [class.justify-center]="collapsed()"
          [attr.title]="collapsed() ? 'File' : null">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" fill="none"
            viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z" />
          </svg>
          @if (!collapsed()) { <span class="truncate">File</span> }
        </a>
      </li>
      <li>
        <a routerLink="/filemanager/uploads" routerLinkActive="menu-active"
          [class.justify-center]="collapsed()"
          [attr.title]="collapsed() ? 'Upload' : null">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" fill="none"
            viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
          </svg>
          @if (!collapsed()) { <span class="truncate">Upload</span> }
        </a>
      </li>
      <li>
        <a routerLink="/filemanager/shared" routerLinkActive="menu-active"
          [class.justify-center]="collapsed()"
          [attr.title]="collapsed() ? 'Shared with me' : null">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" fill="none"
            viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v6a2 2 0 01-2 2h-3l-4 4z" />
          </svg>
          @if (!collapsed()) { <span class="truncate">Shared with me</span> }
        </a>
      </li>
    </ul>
  </nav>

  <!-- Logout -->
  <div class="border-base-300 border-t p-3">
    <a class="text-error hover:bg-base-200 flex cursor-pointer items-center gap-3 rounded-lg px-4 py-2"
      (click)="logout()"
      [class.justify-center]="collapsed()"
      [attr.title]="collapsed() ? 'Logout' : null">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" fill="none"
        viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
      </svg>
      @if (!collapsed()) { <span class="truncate">Logout</span> }
    </a>
  </div>
</aside>
