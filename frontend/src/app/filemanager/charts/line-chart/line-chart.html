<div class="flex flex-col gap-2">
  <svg [attr.viewBox]="'0 0 ' + viewW + ' ' + viewH" class="h-32 w-full" preserveAspectRatio="none">
    <defs>
      <linearGradient [attr.id]="gradientId" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" [attr.stop-color]="color()" stop-opacity="0.35" />
        <stop offset="100%" [attr.stop-color]="color()" stop-opacity="0" />
      </linearGradient>
    </defs>
    <path [attr.d]="areaPath()" [attr.fill]="'url(#' + gradientId + ')'" />
    <path [attr.d]="linePath()" fill="none" [attr.stroke]="color()"
      stroke-width="2" stroke-linejoin="round" stroke-linecap="round"
      vector-effect="non-scaling-stroke" />
  </svg>

  <div class="text-base-content/50 flex justify-between text-xs">
    @for (p of data(); track p.label) {
      <span class="truncate">{{ p.label }}</span>
    }
  </div>
</div>
