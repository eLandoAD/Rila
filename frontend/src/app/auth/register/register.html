<div class="hero bg-base-200 min-h-screen">
  <div class="hero-content flex-col lg:flex-row-reverse">

    <!-- Left side text -->
    <div class="text-center lg:text-left">
      <h1 class="text-5xl font-bold">Create an Account</h1>
      <p class="py-6">
        Join our platform and start using all the available features.
        After registration, you'll receive an email to verify your account.
      </p>
    </div>

    <!-- Register Card -->
    <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow-2xl">
      <div class="card-body">

        <form class="fieldset" (ngSubmit)="submit()" #registerForm="ngForm">

          @if (error()) {
            <div role="alert" class="alert alert-error text-sm">
              <span>{{ error() }}</span>
            </div>
          }

          <label class="label">Username</label>
          <input
            type="text"
            name="username"
            class="input"
            placeholder="Enter your username"
            autocomplete="username"
            required
            minlength="3"
            [(ngModel)]="username"
          />

          <label class="label">Email</label>
          <input
            type="email"
            name="email"
            class="input"
            placeholder="Enter your email"
            autocomplete="email"
            required
            email
            [(ngModel)]="email"
          />

          <label class="label">Password</label>
          <input
            type="password"
            name="password"
            class="input"
            placeholder="Create a password"
            autocomplete="new-password"
            required
            minlength="8"
            [(ngModel)]="password"
          />

          <label class="label">Confirm Password</label>
          <input
            type="password"
            name="confirmPassword"
            class="input"
            placeholder="Confirm your password"
            autocomplete="new-password"
            required
            [(ngModel)]="confirmPassword"
          />

          <button
            type="submit"
            class="btn btn-primary mt-4"
            [disabled]="loading() || registerForm.invalid"
          >
            @if (loading()) {
              <span class="loading loading-spinner loading-sm"></span>
            }
            Sign Up
          </button>

          <div class="text-center mt-3">
            <span>Already have an account? </span>
            <a routerLink="/login" class="link link-hover">
              Login
            </a>
          </div>

        </form>

      </div>
    </div>

  </div>
</div>
