<div class="hero bg-base-200 min-h-screen">
  <div class="hero-content flex-col lg:flex-row-reverse">

    <!-- Left side text -->
    <div class="text-center lg:text-left">
      <h1 class="text-5xl font-bold">Reset Password</h1>

      <p class="py-6">
        Create a new password for your account.
        Make sure it's strong and easy for you to remember.
      </p>
    </div>

    <!-- Reset Password Card -->
    <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow-2xl">
      <div class="card-body">

        @if (done()) {
          <div role="alert" class="alert alert-success text-sm">
            <span>Your password has been updated. You can now log in.</span>
          </div>

          <a routerLink="/login" class="btn btn-primary mt-4">
            Go to Login
          </a>
        } @else {
          <form class="fieldset" (ngSubmit)="submit()" #resetForm="ngForm">

            @if (error()) {
              <div role="alert" class="alert alert-error text-sm">
                <span>{{ error() }}</span>
              </div>
            }

            <label class="label">Recovery Key</label>
            <input
              type="text"
              name="recoveryKey"
              class="input"
              placeholder="SV-XXXX-XXXX-XXXX-XXXX-XXXX"
              autocomplete="off"
              required
              [(ngModel)]="recoveryKey"
            />

            <label class="label mt-2">New Password</label>
            <input
              type="password"
              name="password"
              class="input"
              placeholder="Enter your new password"
              autocomplete="new-password"
              required
              minlength="8"
              [(ngModel)]="newPassword"
            />

            <label class="label mt-2">Confirm New Password</label>
            <input
              type="password"
              name="confirmPassword"
              class="input"
              placeholder="Confirm your new password"
              autocomplete="new-password"
              required
              [(ngModel)]="confirmPassword"
            />

            <button
              type="submit"
              class="btn btn-primary mt-6"
              [disabled]="loading() || resetForm.invalid"
            >
              @if (loading()) {
                <span class="loading loading-spinner loading-sm"></span>
              }
              Update Password
            </button>

            <div class="text-center mt-4">
              <span>Remembered your password? </span>

              <a
                routerLink="/login"
                class="link link-hover"
              >
                Back to Login
              </a>
            </div>

          </form>
        }

      </div>
    </div>

  </div>
</div>
